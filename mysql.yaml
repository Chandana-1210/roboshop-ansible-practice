- name: mysql setup
  hosts: mysql
  become: yes
  tasks:
    - name: install mysql server
      ansible.builtin.package:
        name: mysql-server
        state: present

    - name: start and enable the service
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: yes
    - name: setting password
      ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1